<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pendulum Metronome</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111120;
      color: #f0e6d3;
      font-family: 'Georgia', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px 10px 24px;
      gap: 18px;
    }

    h1 {
      font-size: clamp(1rem, 4vw, 1.8rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #d4af70;
    }

    /* ── Stage ── */
    #stage-container {
      display: flex;
      align-items: stretch;
      width: 100%;
      max-width: 680px;
      height: clamp(280px, 55vw, 480px);
      border-radius: 2px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    /* ── Brick walls ── */
    .wall {
      flex: 0 0 22%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
      /* Staggered brick pattern via layered CSS backgrounds */
      background-color: #b94a2c;
      background-image:
        /* Row A vertical joints (mortar) */
        repeating-linear-gradient(
          90deg,
          transparent 0,
          transparent 52px,
          #7a3018 52px,
          #7a3018 57px
        ),
        /* Row B vertical joints, offset by half-brick */
        repeating-linear-gradient(
          90deg,
          #7a3018 0,
          #7a3018 5px,
          transparent 5px,
          transparent 31px,
          #7a3018 31px,
          #7a3018 36px,
          transparent 36px,
          transparent 63px,
          #7a3018 63px,
          #7a3018 68px,
          transparent 68px,
          transparent 95px
        ),
        /* Horizontal mortar */
        repeating-linear-gradient(
          180deg,
          transparent 0,
          transparent 22px,
          #7a3018 22px,
          #7a3018 27px
        );
      background-size: 100% 49px, 100% 49px, 100% 49px;
      background-position: 0 0, 0 26px, 0 0;
      transition: filter 0.04s ease;
    }

    /* Subtle brick color variation overlay */
    .wall::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        180deg,
        rgba(200,80,30,0.12) 0,
        rgba(200,80,30,0.12) 22px,
        rgba(90,20,5,0.10) 22px,
        rgba(90,20,5,0.10) 27px,
        rgba(160,50,15,0.08) 27px,
        rgba(160,50,15,0.08) 49px
      );
      pointer-events: none;
    }

    /* Flash on hit */
    .wall.flash {
      filter: brightness(2.2) saturate(0.6);
    }

    .beat-number {
      position: relative;
      z-index: 2;
      font-size: clamp(64px, 14vw, 130px);
      font-weight: 900;
      font-family: 'Georgia', serif;
      color: rgba(255,255,255,0.18);
      text-shadow:
        0 2px 6px rgba(0,0,0,0.6),
        0 0 20px rgba(255,180,80,0.12);
      user-select: none;
      line-height: 1;
    }

    /* ── Pendulum SVG area ── */
    #stage-svg {
      flex: 1;
      display: block;
      background: linear-gradient(180deg, #1a1a30 0%, #141426 100%);
      /* subtle center light from above */
      box-shadow: inset 0 0 60px rgba(150,120,60,0.06);
    }

    /* ── Controls ── */
    #controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 380px;
    }

    #bpm-row {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    #bpm-display {
      font-size: clamp(1.3rem, 4vw, 2rem);
      font-weight: bold;
      color: #d4af70;
      letter-spacing: 0.06em;
      min-width: 108px;
      text-align: right;
    }

    #bpm-slider {
      flex: 1;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: #2e2e48;
      border-radius: 3px;
      outline: none;
    }

    #bpm-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      background: #d4af70;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(212,175,112,0.5);
    }

    #bpm-slider::-moz-range-thumb {
      width: 22px;
      height: 22px;
      background: #d4af70;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 6px rgba(212,175,112,0.5);
    }

    #start-stop {
      padding: 13px 54px;
      font-size: 1.05rem;
      font-family: 'Georgia', serif;
      letter-spacing: 0.22em;
      background: #d4af70;
      color: #111120;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.15s, transform 0.08s;
    }

    #start-stop:hover { background: #e5c880; }
    #start-stop:active { transform: scale(0.96); }
    #start-stop.running { background: #d95555; color: #fff; }
  </style>
</head>
<body>

  <h1>Pendulum Metronome</h1>

  <div id="stage-container">

    <!-- Left wall — beat 3 -->
    <div id="left-wall" class="wall">
      <span class="beat-number">3</span>
    </div>

    <!-- Pendulum stage -->
    <svg id="stage-svg" viewBox="0 0 300 500" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
      <!-- Ceiling mount block -->
      <rect x="120" y="0" width="60" height="35" rx="0" fill="#22223a"/>
      <rect x="138" y="30" width="24" height="22" fill="#2a2a42"/>
      <!-- Pivot pin shadow -->
      <ellipse cx="150" cy="52" rx="10" ry="4" fill="rgba(0,0,0,0.35)"/>
      <!-- Rod -->
      <line id="rod" x1="150" y1="50" x2="150" y2="415"
            stroke="#b09050" stroke-width="5" stroke-linecap="round"/>
      <!-- Bob shadow -->
      <ellipse id="bob-shadow" cx="150" cy="434" rx="20" ry="7" fill="rgba(0,0,0,0.25)"/>
      <!-- Bob -->
      <circle id="bob" cx="150" cy="415" r="24" fill="#d4af70"/>
      <!-- Bob inner ring -->
      <circle cx="150" cy="415" id="bob-ring" r="18" fill="none" stroke="#e8c980" stroke-width="1.5" opacity="0.7"/>
      <!-- Bob shine -->
      <circle id="bob-shine" cx="143" cy="407" r="7" fill="rgba(255,255,255,0.28)"/>
      <!-- Pivot -->
      <circle cx="150" cy="50" r="9" fill="#d4af70" stroke="#e8c980" stroke-width="1.5"/>
      <circle cx="147" cy="47" r="3" fill="rgba(255,255,255,0.4)"/>
      <!-- Floor line -->
      <rect x="0" y="490" width="300" height="10" fill="#0d0d20"/>
    </svg>

    <!-- Right wall — beat 1 -->
    <div id="right-wall" class="wall">
      <span class="beat-number">1</span>
    </div>

  </div>

  <!-- Controls -->
  <div id="controls">
    <div id="bpm-row">
      <div id="bpm-display">120 BPM</div>
      <input type="range" id="bpm-slider" min="40" max="208" value="120" step="1">
    </div>
    <button id="start-stop">START</button>
  </div>

<script>
  // ─── Constants ───────────────────────────────────────────────────────────
  const PIVOT_X      = 150;
  const PIVOT_Y      = 50;
  const ROD_LENGTH   = 365;   // SVG units, pivot to bob center
  const BOB_R        = 24;
  const MAX_ANGLE    = 44 * Math.PI / 180; // radians
  const HIT_THRESH   = 0.96;  // cos value near ±1 that triggers a beat

  // ─── State ───────────────────────────────────────────────────────────────
  let running    = false;
  let bpm        = 120;
  let startTime  = null;
  let animFrame  = null;
  let lastSide   = null;   // 'right' | 'left' — debounce clicks
  let audioCtx   = null;

  // ─── DOM refs ────────────────────────────────────────────────────────────
  const rod        = document.getElementById('rod');
  const bob        = document.getElementById('bob');
  const bobRing    = document.getElementById('bob-ring');
  const bobShine   = document.getElementById('bob-shine');
  const bobShadow  = document.getElementById('bob-shadow');
  const leftWall   = document.getElementById('left-wall');
  const rightWall  = document.getElementById('right-wall');
  const bpmDisplay = document.getElementById('bpm-display');
  const bpmSlider  = document.getElementById('bpm-slider');
  const startBtn   = document.getElementById('start-stop');

  // ─── Audio ───────────────────────────────────────────────────────────────
  function ac() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playClick(isOne) {
    const ctx = ac();
    const t   = ctx.currentTime;
    const vol = isOne ? 1.0 : 0.62;

    // ── Crack: sharp wideband noise burst (the "slap" of the clapper) ──
    const frames = Math.ceil(ctx.sampleRate * 0.13);
    const buf    = ctx.createBuffer(1, frames, ctx.sampleRate);
    const data   = buf.getChannelData(0);
    for (let i = 0; i < frames; i++) data[i] = Math.random() * 2 - 1;

    const noise = ctx.createBufferSource();
    noise.buffer = buf;

    // Highpass strips low rumble, bandpass focuses the crack frequency
    const hp = ctx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 1600;

    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = isOne ? 5500 : 3800;
    bp.Q.value = 0.6;

    const noiseGain = ctx.createGain();
    noise.connect(hp);
    hp.connect(bp);
    bp.connect(noiseGain);
    noiseGain.connect(ctx.destination);

    // Instantaneous peak then fast exponential tail — the snap
    noiseGain.gain.setValueAtTime(vol * 3.2, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.055);

    noise.start(t);
    noise.stop(t + 0.13);

    // ── Body: short woody thud underneath the crack ──
    const body     = ctx.createOscillator();
    const bodyGain = ctx.createGain();
    body.connect(bodyGain);
    bodyGain.connect(ctx.destination);

    body.type = 'triangle';
    body.frequency.setValueAtTime(isOne ? 210 : 150, t);
    body.frequency.exponentialRampToValueAtTime(isOne ? 75 : 55, t + 0.07);

    bodyGain.gain.setValueAtTime(vol * 0.55, t);
    bodyGain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);

    body.start(t);
    body.stop(t + 0.13);
  }

  // ─── Flash wall ──────────────────────────────────────────────────────────
  let flashTimer = { left: null, right: null };

  function flashWall(wall, side) {
    if (flashTimer[side]) clearTimeout(flashTimer[side]);
    wall.classList.add('flash');
    flashTimer[side] = setTimeout(() => wall.classList.remove('flash'), 90);
  }

  // ─── Pendulum geometry ───────────────────────────────────────────────────
  function applyAngle(angleRad) {
    const bx = PIVOT_X + ROD_LENGTH * Math.sin(angleRad);
    const by = PIVOT_Y + ROD_LENGTH * Math.cos(angleRad);

    rod.setAttribute('x2', bx);
    rod.setAttribute('y2', by);

    bob.setAttribute('cx', bx);
    bob.setAttribute('cy', by);
    bobRing.setAttribute('cx', bx);
    bobRing.setAttribute('cy', by);
    bobShine.setAttribute('cx', bx - 7);
    bobShine.setAttribute('cy', by - 8);
    bobShadow.setAttribute('cx', bx);
    // shadow offset slightly below, compressed as pendulum swings
    bobShadow.setAttribute('cy', by + BOB_R - 2);
  }

  // ─── Animation loop ──────────────────────────────────────────────────────
  function tick(ts) {
    if (!running) return;
    if (startTime === null) startTime = ts;

    const elapsed = (ts - startTime) / 1000;        // seconds
    const period  = 120 / bpm;                       // seconds per full cycle
    const phase   = (elapsed % period) / period;     // 0..1

    // cos: +1 at phase=0 (right / beat 1), -1 at phase=0.5 (left / beat 3)
    const cosVal  = Math.cos(2 * Math.PI * phase);
    const angle   = MAX_ANGLE * cosVal;

    applyAngle(angle);

    // Beat detection — fire once per wall approach
    if (cosVal > HIT_THRESH && lastSide !== 'right') {
      lastSide = 'right';
      playClick(true);
      flashWall(rightWall, 'right');
    } else if (cosVal < -HIT_THRESH && lastSide !== 'left') {
      lastSide = 'left';
      playClick(false);
      flashWall(leftWall, 'left');
    }

    animFrame = requestAnimationFrame(tick);
  }

  // ─── Controls ────────────────────────────────────────────────────────────
  bpmSlider.addEventListener('input', () => {
    bpm = parseInt(bpmSlider.value, 10);
    bpmDisplay.textContent = `${bpm} BPM`;
    if (running) {
      // Re-anchor start time to current moment so phase resets smoothly
      startTime = performance.now();
      lastSide  = null;
    }
  });

  startBtn.addEventListener('click', () => {
    if (!running) {
      running   = true;
      startTime = null;
      lastSide  = null;
      startBtn.textContent = 'STOP';
      startBtn.classList.add('running');
      ac().resume();
      animFrame = requestAnimationFrame(tick);
    } else {
      running = false;
      cancelAnimationFrame(animFrame);
      startBtn.textContent = 'START';
      startBtn.classList.remove('running');
      applyAngle(0);  // park at center
    }
  });

  // ─── Init ────────────────────────────────────────────────────────────────
  applyAngle(MAX_ANGLE);  // rest at right wall position
</script>
</body>
</html>
